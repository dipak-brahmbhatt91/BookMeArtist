<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Primary SEO -->
    <title>BookMeArtist — Book Verified Musicians, Photographers & Performers</title>
    <meta name="description" content="Discover and book world-class creative talent for your next event or project. Verified musicians, photographers, dancers, and performers. No agency fees — book directly." />
    <meta name="keywords" content="book artist, hire musician, book photographer, hire performer, creative talent marketplace, event booking, artist booking platform" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="BookMeArtist" />

    <!-- Canonical -->
    <link rel="canonical" href="https://bookmeartist.replit.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BookMeArtist" />
    <meta property="og:url" content="https://bookmeartist.replit.app/" />
    <meta property="og:title" content="BookMeArtist — Book Verified Musicians, Photographers & Performers" />
    <meta property="og:description" content="Discover and book world-class creative talent for your next event or project. Verified musicians, photographers, dancers, and performers. No agency fees." />
    <meta property="og:image" content="https://bookmeartist.replit.app/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BookMeArtist — The new standard for creative bookings" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bookmeartist" />
    <meta name="twitter:title" content="BookMeArtist — Book Verified Musicians, Photographers & Performers" />
    <meta name="twitter:description" content="Discover and book world-class creative talent for your next event or project. No agency fees — book directly." />
    <meta name="twitter:image" content="https://bookmeartist.replit.app/opengraph.jpg" />
    <meta name="twitter:image:alt" content="BookMeArtist — The new standard for creative bookings" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Fonts: preconnect + preload for LCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://bookmeartist.replit.app/#website",
          "url": "https://bookmeartist.replit.app/",
          "name": "BookMeArtist",
          "description": "The new standard for creative bookings. Book verified musicians, photographers, dancers, and performers directly.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://bookmeartist.replit.app/artists?search={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://bookmeartist.replit.app/#organization",
          "name": "BookMeArtist",
          "url": "https://bookmeartist.replit.app/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://bookmeartist.replit.app/favicon.svg"
          },
          "description": "BookMeArtist is an artist marketplace that connects clients with verified creative professionals — musicians, photographers, dancers, painters, and more.",
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer support",
            "email": "hello@bookmeartist.com"
          },
          "sameAs": []
        },
        {
          "@type": "Service",
          "@id": "https://bookmeartist.replit.app/#service",
          "name": "Artist Booking Platform",
          "provider": {
            "@id": "https://bookmeartist.replit.app/#organization"
          },
          "serviceType": "Artist Booking",
          "description": "Book musicians, photographers, painters, dancers, comedians and designers for events and projects.",
          "areaServed": "Worldwide",
          "availableChannel": {
            "@type": "ServiceChannel",
            "serviceUrl": "https://bookmeartist.replit.app/"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
